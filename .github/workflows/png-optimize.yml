---
# Losslessly optimizes PNG icons with optipng, committing the smaller results
# back to the repository. Mirrors svgo.yml (which does the same for SVGs).
# optipng only recompresses and strips metadata -- pixel data and dimensions
# are untouched, so icons are never visually degraded.
name: Optimize PNG Files

on:
  push:
    branches: [master]

permissions:
  contents: write

# Queue runs instead of racing: rapid-fire merges each trigger a run, and
# concurrent runs pushing to master reject each other (non-fast-forward).
concurrency:
  group: png-optimize-master
  cancel-in-progress: false

jobs:
  pngs:
    name: PNGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Check out the branch tip rather than the trigger SHA so a queued
          # run builds on the previous run's optimize commit and its push
          # fast-forwards.
          ref: master
          fetch-depth: 0

      - name: Install optipng
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y optipng

      - name: Optimize PNGs
        id: optipng
        shell: bash
        run: |
          set -euo pipefail

          # Determine the PNG files changed in this push. Fall back to every
          # tracked PNG when the previous commit is unavailable (e.g. the first
          # push to a branch or a force push).
          before="${{ github.event.before }}"
          if [ -z "$before" ] \
            || [ "$before" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            mapfile -t files < <(git ls-files -- '*.png')
          else
            mapfile -t files < <(git diff --name-only --diff-filter=d \
              "$before" "${{ github.sha }}" -- '*.png')
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No PNG files to optimize."
            echo "optimized_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Optimizing ${#files[@]} PNG file(s):"
          printf '  %s\n' "${files[@]}"
          # -o5: thorough lossless search; -strip all: drop metadata chunks.
          optipng -o5 -strip all "${files[@]}"

          # Count the files optipng actually changed so the commit message matches.
          count=$(git diff --name-only -- '*.png' | wc -l | tr -d '[:space:]')
          echo "optimized_count=${count}" >> "$GITHUB_OUTPUT"

      - name: Commit optimizations
        uses: stefanzweifel/git-auto-commit-action@v7
        if: ${{ steps.optipng.outputs.optimized_count != '0' }}
        with:
          commit_message: Optimize ${{steps.optipng.outputs.optimized_count}} PNG(s) # yamllint disable-line rule:line-length
          file_pattern: '*.png'
