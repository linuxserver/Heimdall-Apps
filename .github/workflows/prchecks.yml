---
name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  test_all_apps:
    name: Test all Apps
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        # Node >= 21 is required for glob patterns in `node --test`
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup node env
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Run App Tests
        run: node testRunner.js

      - name: Run unit tests
        run: node --test "scripts/tests/*.test.js"
